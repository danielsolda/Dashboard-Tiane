{% extends "base.html" %}
{% block title %}Conectar{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm" style="border-radius: 16px;">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="bi bi-graph-up-arrow" style="font-size: 3rem; color: var(--primary-color);"></i>
                </div>
                <h2 class="fw-bold mb-2">Dashboard Tiane</h2>
                <p class="text-muted mb-4">Conecte sua conta Kommo CRM para visualizar suas metricas comerciais.</p>

                <a href="{{ auth_url }}" class="btn btn-primary btn-lg w-100 mt-2">
                    <i class="bi bi-plug"></i> Conectar com Kommo
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
