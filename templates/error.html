{% extends "base.html" %}
{% block title %}Erro{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-sm" style="border-radius: 16px;">
            <div class="card-body p-5">
                <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: #ef4444;"></i>
                <h3 class="mt-3 fw-bold">Ocorreu um erro</h3>
                <p class="text-muted">{{ error_message }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
                    <i class="bi bi-arrow-left"></i> Voltar ao inicio
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
